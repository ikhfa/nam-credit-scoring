seed: 42

data:
  raw_path: data/raw/credit_default.csv
  processed_dir: data/processed
  train_ratio: 0.60
  cal_ratio: 0.15
  test_ratio: 0.25

nam:
  hidden_sizes: [128, 128, 128]
  dropout: 0.1
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 256
  max_epochs: 500
  early_stop_patience: 20
  output_penalty: 0.0
  feature_dropout: 0.1

xgboost:
  max_depth: 6
  learning_rate: 0.1
  n_estimators: 500
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 30

conformal:
  alpha_levels: [0.05, 0.10, 0.20]
  method: score

evaluation:
  n_bootstrap: 1000
  ece_bins: 10
